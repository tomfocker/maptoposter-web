<h2>1. Web 面板的功能优先级</h2>
<p class="subtitle">为了让 MapToPoster “开箱即用”，你认为最重要的前三个功能是什么？</p>

<div class="options" data-multiselect>
  <div class="option" data-choice="input" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>地址搜索 & 预览</h3>
      <p>搜索城市并实时查看地图边界。预览生成后的海报效果。</p>
    </div>
  </div>
  <div class="option" data-choice="themes" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>内置 17 种主题快速选择</h3>
      <p>图形化选择内置的复古、霓虹等配色方案。</p>
    </div>
  </div>
  <div class="option" data-choice="history" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>生成历史管理</h3>
      <p>保存生成过的海报，支持查看和重新下载。</p>
    </div>
  </div>
  <div class="option" data-choice="custom" onclick="toggleSelect(this)">
    <div class="letter">D</div>
    <div class="content">
      <h3>高级参数自定义</h3>
      <p>微调 DPI、海报比例、字体大小等高级控制。</p>
    </div>
  </div>
</div>
