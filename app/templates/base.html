<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MapToPoster Web{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}">
</head>
<body class="min-h-screen bg-stone-100 text-slate-900">
    <div data-ui="studio-shell" class="min-h-screen">
        <header class="border-b border-black/5 bg-white/90 backdrop-blur">
            <nav class="mx-auto flex w-full max-w-7xl items-center px-4 py-4 sm:px-6 lg:px-8">
                <div>
                    <p class="text-xs font-semibold tracking-[0.24em] text-slate-500">地图海报工作室</p>
                    <h1 class="text-lg font-semibold text-slate-900">输入地点，快速生成一张可下载的城市海报</h1>
                </div>
            </nav>
        </header>
        <main class="mx-auto w-full max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
