<div
    id="progress-container-{{ task_id }}"
    hx-get="/status/{{ task_id }}"
    hx-trigger="every 1s"
    hx-swap="outerHTML"
    class="text-center p-6 border rounded-lg bg-gray-50 flex flex-col justify-center h-full"
>
    <svg class="animate-spin h-10 w-10 text-blue-600 mx-auto mb-4" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
    </svg>
    <h3 class="text-lg font-semibold text-gray-800">正在生成，请耐心等待...</h3>
    <p class="text-xs text-gray-500 mt-1">地理数据下载及高清渲染可能需要一至两分钟</p>
    <div class="mt-4 bg-black rounded p-3 text-left overflow-hidden">
        <p class="text-xs font-mono text-green-400 truncate">&gt; {{ log }}</p>
    </div>
</div>
