{% for item in items %}
<div class="group relative bg-gray-50 border rounded-lg p-2 flex flex-col items-center">
    <div class="w-full h-64 overflow-hidden rounded mb-2 bg-white flex items-center justify-center">
        <img src="/posters/{{ item }}" class="max-h-full max-w-full object-contain shadow-sm group-hover:scale-105 transition duration-300">
    </div>
    <p class="text-[10px] text-gray-500 truncate w-full text-center mb-2 px-2" title="{{ item }}">{{ item }}</p>
    <div class="w-full">
        <a href="/posters/{{ item }}" download class="block w-full text-center bg-gray-200 hover:bg-blue-600 hover:text-white text-gray-700 text-xs py-2 rounded transition">
            下载高清原图
        </a>
    </div>
</div>
{% endfor %}
