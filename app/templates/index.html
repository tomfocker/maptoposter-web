{% extends "base.html" %}

{% block content %}
<div class="flex flex-col lg:flex-row gap-8">
    <!-- 侧边栏：参数表单 -->
    <aside class="w-full lg:w-1/3 bg-white rounded-lg shadow-sm p-6">
        <h2 class="text-lg font-semibold mb-6 border-b pb-2">生成新海报</h2>
        
        <form id="poster-form" hx-post="/generate" hx-target="#preview-area" hx-indicator="#loading-indicator">
            <div class="space-y-4">
                <!-- 城市搜索 -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">城市名称</label>
                    <input type="text" name="city" placeholder="例如: Shanghai" class="w-full border rounded px-3 py-2" required>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">国家名称</label>
                    <input type="text" name="country" placeholder="例如: China" class="w-full border rounded px-3 py-2" required>
                </div>

                <!-- 主题选择 -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">主题方案</label>
                    <select name="theme" class="w-full border rounded px-3 py-2">
                        {% for theme in themes %}
                        <option value="{{ theme }}">{{ theme.capitalize() }}</option>
                        {% endfor %}
                    </select>
                </div>

                <!-- 高级设置 -->
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">半径 (米)</label>
                        <input type="number" name="dist" value="4000" class="w-full border rounded px-3 py-2">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">DPI</label>
                        <input type="number" name="dpi" value="300" class="w-full border rounded px-3 py-2">
                    </div>
                </div>

                <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition duration-200">
                    立即生成
                </button>
            </div>
        </form>

        <div id="loading-indicator" class="htmx-indicator mt-4 flex items-center justify-center space-x-2 text-blue-600">
            <svg class="animate-spin h-5 w-5 mr-3" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span>地图生成中，这可能需要一两分钟...</span>
        </div>
    </aside>

    <!-- 主预览区域 -->
    <section class="flex-1 bg-white rounded-lg shadow-sm p-6 flex flex-col items-center justify-center min-h-[600px]">
        <h2 class="text-lg font-semibold mb-6 border-b pb-2 self-stretch">海报预览</h2>
        <div id="preview-area" class="w-full flex items-center justify-center border-2 border-dashed border-gray-200 rounded-lg p-4 bg-gray-50 min-h-[500px]">
            <div class="text-center text-gray-400">
                <p class="mb-2">生成的地图将在这里显示</p>
                <p class="text-xs">支持 PNG 和高清 PDF 预览</p>
            </div>
        </div>
    </section>
</div>

<!-- 历史记录区域 -->
<section class="mt-8 bg-white rounded-lg shadow-sm p-6">
    <h2 class="text-lg font-semibold mb-6 border-b pb-2">最近生成记录</h2>
    <div id="history-list" hx-get="/history" hx-trigger="load, posterGenerated from:body" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
        <p class="text-gray-400 italic">正在加载历史记录...</p>
    </div>
</section>
{% endblock %}
